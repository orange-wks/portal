    歌い手オリジナル中心で、<a href="http://singlink.in" target="_blank">シングリンク</a>会員の手でＣＤを作っていこうかと。<br />制作委員会を立ち上げ予定です。<br /><br />最初に楽曲提供者の立候補を呼びかけることになると思います。<br />あと逆に制作委員会側からアプローチもすることになるかな？<br /><br />そして、歌い手は応募者の中から楽曲提供者が選ぶ形式で進めていく予定です。<br /><br />私自身は制作委員会に入って制作進行や調整をする予定。<br /><br />目標は冬コミでのリリースです。
